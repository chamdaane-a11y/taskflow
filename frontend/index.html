<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card glass">
      <div class="auth-logo">
        <div class="logo-icon">✦</div>
        <span>TaskFlow</span>
      </div>
      <h2>Bon retour 👋</h2>
      <p class="auth-sub">Connecte-toi pour accéder à tes tâches</p>

      <div id="erreur" class="alert alert-error" style="display:none"></div>

      <form id="formLogin">
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="toi@email.com" required>
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-main">
          <span>Se connecter</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>

      <p class="auth-switch">Pas de compte ? <a href="register.html">S'inscrire</a></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

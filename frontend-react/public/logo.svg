<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6c63ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Accent glow derrière -->
  <ellipse cx="256" cy="256" rx="180" ry="180" fill="#6c63ff" opacity="0.07"/>

  <!-- Bordure subtile -->
  <rect width="512" height="512" rx="112" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.3"/>

  <!-- Lettre G -->
  <text x="88" y="330"
    font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif"
    font-size="248"
    font-weight="800"
    fill="url(#grad)"
    filter="url(#glow)"
    letter-spacing="-8">G</text>

  <!-- Lettre S -->
  <text x="258" y="330"
    font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif"
    font-size="248"
    font-weight="800"
    fill="url(#grad2)"
    filter="url(#glow)"
    letter-spacing="-8">S</text>

  <!-- Ligne accent sous les lettres -->
  <rect x="88" y="348" width="336" height="5" rx="3" fill="url(#grad)" opacity="0.6"/>

  <!-- Point lumineux coin -->
  <circle cx="420" cy="92" r="12" fill="#a855f7" opacity="0.7"/>
  <circle cx="92" cy="420" r="8" fill="#6c63ff" opacity="0.5"/>
</svg>
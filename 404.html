<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    var path = window.location.pathname.replace('/taskflow', '') || '/';
    var search = window.location.search;
    var hash = window.location.hash;
    sessionStorage.setItem('redirect', path + search + hash);
    window.location.replace('/taskflow/');
  </script>
</head>
<body></body>
</html>
